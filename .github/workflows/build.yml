name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Build APK with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          echo "APK built successfully"

      - name: Generate JAR from APK
        run: |
          DIR="jar"
          APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          WORK="$DIR/Smali_classes"
          SPIDER="$DIR/spider.jar"
          OUT="$DIR/custom_spider.jar"
          APKTOOL="$DIR/3rd/apktool_2.11.0.jar"

          # Clean
          rm -f "$OUT" "$OUT.md5"
          rm -rf "$WORK"

          # Decompile APK
          java -jar "$APKTOOL" d -f --only-main-classes "$APK" -o "$WORK"

          # Extract spider classes
          rm -rf "$SPIDER/smali/com/github/catvod/spider"
          rm -rf "$SPIDER/smali/com/github/catvod/js"
          mkdir -p "$SPIDER/smali/com/github/catvod"
          mv "$WORK/smali/com/github/catvod/spider" "$SPIDER/smali/com/github/catvod/"
          mv "$WORK/smali/com/github/catvod/js" "$SPIDER/smali/com/github/catvod/"

          # Rebuild JAR
          java -jar "$APKTOOL" b "$SPIDER" -c
          mv "$SPIDER/dist/dex.jar" "$OUT"

          # Generate MD5
          md5sum "$OUT" | awk '{print $1}' > "$OUT.md5"

          # Cleanup
          rm -rf "$SPIDER/build" "$SPIDER/smali" "$SPIDER/dist" "$WORK"

          echo "JAR generated: $OUT ($(stat -c%s "$OUT") bytes)"

      - name: Copy JAR to update.jar
        run: |
          cp jar/custom_spider.jar jar/update.jar
          cp jar/custom_spider.jar.md5 jar/update.jar.md5

      - name: Commit JAR to davstore
        run: |
          git clone https://${{ secrets.DAV_SECRET}}@github.com/david0501z/davstore.git target-repo
          cp jar/update.jar target-repo/jar/
          cp jar/update.jar.md5 target-repo/jar/
          cd target-repo
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add jar/
          git diff --cached --quiet || git commit -m 'Update generated JAR files'
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.DAV_SECRET }}
